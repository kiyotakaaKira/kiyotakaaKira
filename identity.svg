      <stop offset="0%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <filter id="idGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
