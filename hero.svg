<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#3d3dff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3d3dff" stop-opacity="0"/>
      <animate attributeName="cx" values="15%;28%;15%" dur="12s" repeatCount="indefinite"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="80%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
      <animate attributeName="cx" values="85%;72%;85%" dur="14s" repeatCount="indefinite"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="#05050a"/>
  <rect width="1200" height="420" fill="url(#bgGlow1)"/>
  <rect width="1200" height="420" fill="url(#bgGlow2)"/>

  <!-- neural network layer -->
  <g stroke="#7c83fd" stroke-width="1" opacity="0.35">
    <line x1="120" y1="90" x2="260" y2="150"><animate attributeName="opacity" values="0.15;0.55;0.15" dur="4s" repeatCount="indefinite"/></line>
    <line x1="260" y1="150" x2="180" y2="260"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="5s" repeatCount="indefinite"/></line>
    <line x1="180" y1="260" x2="330" y2="300"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/></line>
    <line x1="330" y1="300" x2="120" y2="90"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="6s" repeatCount="indefinite"/></line>
    <line x1="900" y1="70" x2="1040" y2="140"><animate attributeName="opacity" values="0.2;0.55;0.2" dur="4.5s" repeatCount="indefinite"/></line>
    <line x1="1040" y1="140" x2="980" y2="280"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="5.5s" repeatCount="indefinite"/></line>
    <line x1="980" y1="280" x2="1100" y2="330"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="4s" repeatCount="indefinite"/></line>
    <line x1="900" y1="70" x2="1100" y2="330"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="7s" repeatCount="indefinite"/></line>
  </g>

  <g fill="#8b8bf5">
    <circle cx="120" cy="90" r="3.5"><animate attributeName="r" values="2.5;5;2.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="150" r="3"><animate attributeName="r" values="2;4.5;2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="260" r="4"><animate attributeName="r" values="3;5.5;3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="300" r="3"><animate attributeName="r" values="2;4;2" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="70" r="3.5"><animate attributeName="r" values="2.5;5;2.5" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="140" r="3"><animate attributeName="r" values="2;4.5;2" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="280" r="4"><animate attributeName="r" values="3;5.5;3" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="330" r="3"><animate attributeName="r" values="2;4;2" dur="5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- drifting particles -->
  <g fill="#a5b4fc">
    <circle cx="60" cy="380" r="1.6" opacity="0.6"><animate attributeName="cy" values="380;40;380" dur="18s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0" dur="18s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="400" r="1.3" opacity="0.5"><animate attributeName="cy" values="400;20;400" dur="22s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="22s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="410" r="1.8" opacity="0.5"><animate attributeName="cy" values="410;10;410" dur="20s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="20s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="395" r="1.4" opacity="0.5"><animate attributeName="cy" values="395;30;395" dur="24s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="24s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="405" r="1.6" opacity="0.5"><animate attributeName="cy" values="405;15;405" dur="19s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="19s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="390" r="1.3" opacity="0.5"><animate attributeName="cy" values="390;25;390" dur="21s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="21s" repeatCount="indefinite"/></circle>
  </g>

  <!-- hero text -->
  <text x="600" y="205" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="58" font-weight="700" fill="url(#titleGrad)" filter="url(#softGlow)">ADITHYAN</text>
  <text x="600" y="250" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="17" fill="#8b8bf5" letter-spacing="1.5">FOUNDER @ VALSIA · BUILDING SECURE AI INFRASTRUCTURE</text>

  <!-- terminal cursor -->
  <rect x="835" y="233" width="12" height="20" fill="#8b8bf5">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- bottom thin divider glow -->
  <rect x="0" y="410" width="1200" height="1" fill="#7c83fd" opacity="0.25"/>
</svg>
