  </defs>

  <rect width="1200" height="220" fill="url(#idBg)"/>
  <rect x="1" y="1" width="1198" height="218" fill="none" stroke="#7c83fd" stroke-width="1" opacity="0.4"/>

  <text x="600" y="75" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" fill="#6b6bd1" letter-spacing="3">======================================</text>

  <g filter="url(#idGlow)">
    <text x="600" y="118" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="34" font-weight="700" fill="#e8e8ed" letter-spacing="2">
      VALSIA // SYSTEM NODE
      <animate attributeName="opacity" values="1;1;0.3;1;1;0.4;1;1" keyTimes="0;0.4;0.42;0.44;0.7;0.72;0.74;1" dur="9s" begin="0s" repeatCount="indefinite"/>
    </text>
  </g>

  <text x="600" y="150" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#8b8bf5" letter-spacing="1">FOUNDER · AI SYSTEMS ENGINEER · SECURITY RESEARCHER · INFRASTRUCTURE BUILDER</text>

  <text x="600" y="178" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" fill="#6b6bd1" letter-spacing="3">======================================</text>

