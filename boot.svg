<svg width="1200" height="440" viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c83fd" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c83fd" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b8bf5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8b8bf5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b8bf5" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7c83fd" stroke-width="0.4" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="440" fill="#03030a"/>
  <rect width="1200" height="440" fill="url(#grid)"/>
  <rect width="1200" height="440" fill="url(#gridFade)"/>

  <!-- scanline sweep -->
  <rect x="0" y="-80" width="1200" height="80" fill="url(#scanGrad)">
    <animate attributeName="y" values="-80;440" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- ambient particles -->
  <g fill="#a5b4fc">
    <circle cx="80" cy="60" r="1.5" opacity="0.5"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="90" r="1.5" opacity="0.5"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="380" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="400" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- corner brackets, terminal window framing -->
  <g stroke="#8b8bf5" stroke-width="1.5" opacity="0.6" fill="none">
    <path d="M 40 40 L 40 70 M 40 40 L 70 40"/>
    <path d="M 1160 40 L 1160 70 M 1160 40 L 1130 40"/>
    <path d="M 40 400 L 40 370 M 40 400 L 70 400"/>
    <path d="M 1160 400 L 1160 370 M 1160 400 L 1130 400"/>
  </g>

  <!-- boot text lines : shared 12s cycle, all begin=0 so phase-locked -->
  <g font-family="'JetBrains Mono', monospace" font-size="15" fill="#8b8bf5">
    <text x="90" y="120">&gt; SYSTEM INITIALIZING...
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.04;0.06;0.83;0.87;1" dur="12s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="90" y="150">&gt; BOOTING AI CORE...
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.12;0.14;0.83;0.87;1" dur="12s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="90" y="180">&gt; LOADING FOUNDER PROFILE...
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.21;0.23;0.83;0.87;1" dur="12s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="90" y="210">&gt; DECRYPTING PROJECTS...
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.29;0.31;0.83;0.87;1" dur="12s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="90" y="240">&gt; CONNECTING TO VALSIA NETWORK...
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.37;0.39;0.83;0.87;1" dur="12s" begin="0s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- progress bar -->
  <rect x="90" y="270" width="500" height="14" fill="none" stroke="#7c83fd" stroke-width="1" opacity="0.6">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.46;0.48;0.83;0.87;1" dur="12s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <rect x="92" y="272" width="0" height="10" fill="#8b8bf5" filter="url(#glow)">
    <animate attributeName="width" values="0;0;496;496;496;0" keyTimes="0;0.46;0.62;0.83;0.87;1" dur="12s" begin="0s" repeatCount="indefinite"/>
  </rect>

  <!-- access granted -->
  <text x="90" y="330" font-family="'JetBrains Mono', monospace" font-size="26" font-weight="700" fill="#22d3aa" filter="url(#glow)">
    ACCESS GRANTED
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.625;0.65;0.83;0.87;1" dur="12s" begin="0s" repeatCount="indefinite"/>
  </text>
</svg>
